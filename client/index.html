<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor FPS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="main-menu">
      <div class="menu-scene" aria-hidden="true"></div>

      <div class="menu-shell">
        <div id="menu-home" class="menu-panel">
          <nav class="menu-actions" aria-label="Main menu">
            <button type="button" id="play-btn" class="wood-btn">
              <span>Play</span>
            </button>
            <button type="button" id="menu-continue-btn" class="wood-btn" disabled title="No saved match">
              <span>Continue</span>
            </button>
            <button type="button" id="menu-settings-btn" class="wood-btn">
              <span>Options</span>
            </button>
            <button type="button" id="menu-credits-btn" class="wood-btn">
              <span>Credits</span>
            </button>
            <button type="button" id="menu-exit-btn" class="wood-btn">
              <span>Exit</span>
            </button>
          </nav>
        </div>

        <div id="menu-settings" class="menu-panel menu-modal hidden">
          <h2 class="menu-modal-title">Options</h2>
          <label class="menu-setting">
            <span>Mouse sens</span>
            <div class="menu-setting-row">
              <input id="menu-setting-sens" type="range" min="0.2" max="3" step="0.05" />
              <b id="menu-setting-sens-val">1.00x</b>
            </div>
          </label>
          <label class="menu-setting">
            <span>SFX volume</span>
            <div class="menu-setting-row">
              <input id="menu-setting-vol" type="range" min="0" max="1" step="0.05" />
              <b id="menu-setting-vol-val">60%</b>
            </div>
          </label>
          <label class="menu-setting">
            <span>Music volume</span>
            <div class="menu-setting-row">
              <input id="menu-setting-music" type="range" min="0" max="1" step="0.05" />
              <b id="menu-setting-music-val">2%</b>
            </div>
          </label>
          <button type="button" id="menu-settings-back" class="wood-btn wood-btn-sm">
            <span>Back</span>
          </button>
        </div>

        <div id="menu-credits" class="menu-panel menu-modal hidden">
          <h2 class="menu-modal-title">Credits</h2>
          <p class="menu-credits-body">
            Cursor FPS<br />
            Gun Game arena<br />
            Built with Three.js
          </p>
          <button type="button" id="menu-credits-back" class="wood-btn wood-btn-sm">
            <span>Back</span>
          </button>
        </div>
      </div>
    </div>

    <div id="pause-menu" class="hidden">
      <div class="pause-backdrop"></div>
      <div class="pause-shell">
        <div id="pause-panel-main" class="menu-panel menu-modal">
          <h2 class="menu-modal-title">Paused</h2>
          <div class="menu-actions">
            <button type="button" id="pause-resume" class="wood-btn">
              <span>Resume</span>
            </button>
            <button type="button" id="pause-settings" class="wood-btn">
              <span>Options</span>
            </button>
            <button type="button" id="pause-mainmenu" class="wood-btn">
              <span>Main Menu</span>
            </button>
          </div>
          <p class="pause-hint">Esc resume · Shift sprint · C crouch</p>
        </div>
        <div id="pause-panel-settings" class="menu-panel menu-modal hidden">
          <h2 class="menu-modal-title">Options</h2>
          <label class="menu-setting">
            <span>Mouse sens</span>
            <div class="menu-setting-row">
              <input id="setting-sens" type="range" min="0.2" max="3" step="0.05" />
              <b id="setting-sens-val">1.00x</b>
            </div>
          </label>
          <label class="menu-setting">
            <span>SFX volume</span>
            <div class="menu-setting-row">
              <input id="setting-vol" type="range" min="0" max="1" step="0.05" />
              <b id="setting-vol-val">60%</b>
            </div>
          </label>
          <label class="menu-setting">
            <span>Music volume</span>
            <div class="menu-setting-row">
              <input id="setting-music" type="range" min="0" max="1" step="0.05" />
              <b id="setting-music-val">2%</b>
            </div>
          </label>
          <button type="button" id="pause-settings-back" class="wood-btn wood-btn-sm">
            <span>Back</span>
          </button>
        </div>
      </div>
    </div>

    <div id="overlay" class="hidden">
      <div class="panel">
        <h1>Cursor FPS</h1>
        <p id="overlay-hint">Connecting…</p>
        <p class="hint">Click to play (enters fullscreen) · Esc pauses</p>
      </div>
    </div>

    <div id="hud" class="hidden">
      <div id="scope-iron" class="scope-overlay" aria-hidden="true">
        <div class="iron-post"></div>
        <div class="iron-notch"></div>
      </div>
      <div id="scope-optic" class="scope-overlay" aria-hidden="true">
        <div class="optic-ring"></div>
        <div class="optic-cross optic-h"></div>
        <div class="optic-cross optic-v"></div>
      </div>
      <div id="scope-sniper" class="scope-overlay" aria-hidden="true">
        <div class="sniper-vignette"></div>
        <div class="sniper-lens"></div>
        <div class="sniper-reticle">
          <span class="sr-h"></span>
          <span class="sr-v"></span>
          <span class="sr-dot"></span>
        </div>
      </div>
      <div id="crosshair" aria-hidden="true">
        <span class="ch ch-n"></span>
        <span class="ch ch-s"></span>
        <span class="ch ch-e"></span>
        <span class="ch ch-w"></span>
        <span class="ch-dot"></span>
      </div>
      <div id="hit-marker" aria-hidden="true">
        <span class="hm hm-tl"></span>
        <span class="hm hm-tr"></span>
        <span class="hm hm-bl"></span>
        <span class="hm hm-br"></span>
      </div>
      <div id="damage-flash"></div>
      <div id="kill-feed"></div>
      <div id="stamina-bar" class="hidden" aria-hidden="true">
        <div class="stamina-label">STAMINA</div>
        <div class="stamina-track"><div id="stamina-fill"></div></div>
      </div>
      <div id="hud-bottom">
        <div id="hud-hp-wrap"><span class="label">HP</span> <span id="hud-hp">200</span></div>
        <div id="hud-center">
          <div id="hud-class"></div>
          <div id="hud-weapon"></div>
          <div id="hud-status" class="hidden"></div>
        </div>
        <div id="hud-ammo-wrap"><span class="label">AMMO</span> <span id="hud-ammo">30 / 30</span></div>
      </div>
      <div id="gun-ladder">
        <div id="gun-ladder-title">GUN GAME</div>
        <div id="gun-ladder-level">1 / —</div>
        <div id="gun-ladder-weapon">Pea Shooter</div>
        <div id="gun-ladder-next">Next: Rubber Chicken</div>
      </div>
      <div id="respawn-msg">Respawning…</div>
      <div id="scoreboard">
        <table>
          <thead>
            <tr><th>Team</th><th>Player</th><th>Weapon</th><th>K</th><th>D</th></tr>
          </thead>
          <tbody id="scoreboard-body"></tbody>
        </table>
      </div>
      <div id="debug"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
